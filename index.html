<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>УРАЛ-1</title>
<style>
/* ========================================= */
/* STYLE-001 / ОСНОВА                        */
/* ========================================= */
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050914;
  color: white;
}
button {
  cursor: pointer;
}
/* ========================================= */
/* HEADER-001 / ВЕРХНЕЕ МЕНЮ                 */
/* ========================================= */
.header {
  background: #070b14;
  border-bottom: 1px solid #333;
  padding: 20px;
  text-align: center;
}
.logo {
  color: #ffd66b;
  font-size: 34px;
  font-weight: bold;
  margin-bottom: 18px;
}
.menu {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}
.menu button {
  background: #1c1f27;
  color: white;
  border: 1px solid #666;
  border-radius: 24px;
  padding: 12px 20px;
  font-size: 16px;
}
/* ========================================= */
/* HERO-001 / ГЛАВНЫЙ ЭКРАН                  */
/* ========================================= */
.hero {
  min-height: 70vh;
  background:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.85)),
    url("city.jpg");
  background-size: cover;
  background-position: center;
  padding: 60px 20px;
}
.hero-box {
  max-width: 780px;
  margin: auto;
  background: rgba(0,0,0,0.65);
  border: 1px solid #555;
  border-radius: 28px;
  padding: 35px;
}
.hero-box h1 {
  color: #ffd66b;
  font-size: 56px;
  margin: 0 0 10px;
}
.hero-box h2 {
  font-size: 30px;
}
.hero-box p {
  font-size: 20px;
  line-height: 1.5;
}
.main-buttons {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 30px;
}
.main-buttons button {
  background: #4a3d1f;
  color: white;
  border: 1px solid #a88d43;
  border-radius: 30px;
  padding: 16px 24px;
  font-size: 18px;
}
/* ========================================= */
/* CITY-001 / ПЛОЩАДЬ ОСНОВАТЕЛЕЙ            */
/* ========================================= */
.city-section {
  background: #080d1d;
  padding: 40px 20px;
  text-align: center;
}
.city-grid {
  max-width: 1000px;
  margin: 25px auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}
.card {
  border: 1px solid #555;
  border-radius: 20px;
  padding: 22px;
  background: #111827;
}
.card h3 {
  color: #ffd66b;
}
/* ========================================= */
/* MODAL-001 / ОКНО                          */
/* ========================================= */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-box {
  background: #10172d;
  border: 1px solid #666;
  border-radius: 22px;
  padding: 25px;
  max-width: 600px;
  width: 100%;
}
.modal-box h2 {
  color: #ffd66b;
}
.close-btn {
  margin-top: 20px;
  background: #ffd66b;
  color: black;
  border: none;
  border-radius: 20px;
  padding: 12px 20px;
  font-weight: bold;
}
.tag {
  color: #ffd66b;
  font-weight: bold;
}
@media (max-width: 700px) {
  .city-grid {
    grid-template-columns: 1fr;
  }
  .hero-box h1 {
    font-size: 42px;
  }
}
</style>
</head>
